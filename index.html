<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoltPy Casino & SMM - Nihai Sürüm</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Yükleme Ekranı (Veri gelene kadar kullanıcıyı karşılar) */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #1e293b;
            border-top: 5px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: white; margin-top: 20px; font-family: sans-serif; font-weight: bold; letter-spacing: 1px;">
            VERİLER EŞİTLENİYOR...
        </p>
    </div>

    <div id="app">
        <header class="top-bar">
            <div class="user-info">
                ⚡ <span id="username">VoltPy</span>
            </div>
            <div class="balance-container">
                <span id="balance">0</span> 💰
            </div>
        </header>

        <div class="energy-section">
            <div class="energy-bar-bg">
                <div id="energy-bar"></div>
            </div>
            <div class="energy-info">
                <span id="energy-text">500 / 500</span>
                <span id="energy-regen-timer">+1 ⚡ / 60s</span>
            </div>
            
            <div class="ad-buttons-container">
                <button id="energy-ad-btn" class="action-btn" onclick="window.watchAdForEnergy()">
                    <span>📺 ENERJİ AL</span>
                    <span style="font-size: 13px;">+250 ⚡</span>
                </button>
                <button id="turbo-btn" class="action-btn" onclick="window.startTurboMode()">
                    <span>🚀 TURBO MOD</span>
                    <span><span id="ad-count">0</span>/20</span>
                </button>
            </div>
            <div id="turbo-status">⚡ OTOMASYON AKTİF...</div>
        </div>

        <main>
            <section id="home" class="screen active">
                <div id="tap-button-container">
                    <div id="tap-button">
                        <img src="https://img.icons8.com/clouds/200/lightning-bolt.png" alt="Volt">
                    </div>
                </div>
            </section>

            <section id="earn" class="screen">
                <h2 class="screen-title">🎰 VoltPy Casino</h2>
                
                <div class="wheel-outer">
                    <div class="wheel-pointer"></div>
                    <canvas id="wheel-canvas" width="320" height="320"></canvas>
                </div>

                <div id="reward-display">
                    <span id="reward-text"></span>
                </div>

                <div id="daily-timer-box" style="background: rgba(30, 41, 59, 0.6); padding: 8px 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(0, 255, 136, 0.2);">
                    <span style="color: #94a3b8; font-size: 11px; font-weight: bold;">ÜCRETSİZ HAKKA KALAN: </span>
                    <span id="timer-val" style="color: #00ff88; font-family: monospace; font-weight: 900; font-size: 14px;">00:00:00</span>
                </div>

                <div class="button-group">
                    <button id="spin-button">ÇEVİR (100 💰)</button>
                </div>
            </section>

            <section id="market" class="screen">
                <h2 class="screen-title">🛒 SMM Market</h2>
                <div id="market-list">
                    </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="home">
                <span class="nav-icon">⚡</span>
                <span class="nav-text">TAPPER</span>
            </button>
            <button class="nav-btn" data-target="earn">
                <span class="nav-icon">🎡</span>
                <span class="nav-text">KAZAN</span>
            </button>
            <button class="nav-btn" data-target="market">
                <span class="nav-icon">🛒</span>
                <span class="nav-text">MARKET</span>
            </button>
        </nav>
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
