<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoltPy SMM Bot - Nihai Sürüm</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* YÜKLEME EKRANI (Açılışta Eski Bakiyeyi Gizler) */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #1e293b;
            border-top: 5px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ÇARK YERLEŞİMİ VE ÖDÜL GÖSTERGESİ */
        .wheel-outer {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 20px auto 10px auto;
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4444;
            z-index: 10;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        #reward-display {
            text-align: center;
            height: 40px;
            margin: 10px 0;
            font-family: 'Arial Black', sans-serif;
        }

        #reward-text {
            color: #00ff88;
            font-size: 22px;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        /* GÜNLÜK SAYACIN TASARIMI */
        #free-spin-timer {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 15px;
            font-weight: bold;
            background: rgba(30, 41, 59, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: white; margin-top: 20px; font-family: sans-serif; font-weight: bold;">
            BULUT SENKRONİZASYONU...
        </p>
    </div>

    <div id="app">
        <header class="top-bar">
            <div class="user-info">
                ⚡ <span id="username">Yükleniyor...</span>
            </div>
            <div class="balance-container">
                <span id="balance">0</span> 💰
            </div>
        </header>

        <div class="energy-section">
            <div class="energy-bar-bg">
                <div id="energy-bar" style="width: 100%;"></div>
            </div>
            <div class="energy-info">
                <span id="energy-text">500 / 500</span>
            </div>
        </div>

        <main>
            <section id="home" class="screen active">
                <div id="tap-button-container">
                    <div id="tap-button">
                        <img src="https://img.icons8.com/clouds/200/lightning-bolt.png" alt="Volt">
                    </div>
                </div>
            </section>

            <section id="earn" class="screen" style="text-align: center;">
                <h2 class="screen-title">🎰 Şans Çarkı</h2>
                
                <div class="wheel-outer">
                    <div class="wheel-pointer"></div>
                    <canvas id="wheel-canvas" width="320" height="320"></canvas>
                </div>

                <div id="reward-display">
                    <span id="reward-text"></span>
                </div>

                <div id="free-spin-timer">
                    Ücretsiz hak: <span id="timer-val">Bekleyin...</span>
                </div>

                <div class="button-group">
                    <button id="spin-button">ÇEVİR (100 💰)</button>
                </div>
            </section>

            <section id="market" class="screen">
                <h2 class="screen-title">🛒 SMM Market</h2>
                <div id="market-list">
                    </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="home">
                <span class="nav-icon">⚡</span>
                <span class="nav-text">TAPPER</span>
            </button>
            <button class="nav-btn" data-target="earn">
                <span class="nav-icon">🎡</span>
                <span class="nav-text">KAZAN</span>
            </button>
            <button class="nav-btn" data-target="market">
                <span class="nav-icon">🛒</span>
                <span class="nav-text">MARKET</span>
            </button>
        </nav>
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
