<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoltPy SMM Bot - Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* YÜKLEME EKRANI TASARIMI */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #1e293b;
            border-top: 6px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ÇARK KONTEYNER AYARI */
        .wheel-outer {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 20px auto;
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4444; /* Kırmızı ibre tam tepede */
            z-index: 10;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        #wheel-canvas {
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            border: 5px solid #1e293b;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: white; margin-top: 20px; font-family: 'Segoe UI', sans-serif; font-weight: bold; letter-spacing: 1px;">
            BULUT SENKRONİZASYONU...
        </p>
    </div>

    <div id="app">
        <header class="top-bar">
            <div class="user-info">
                ⚡ <span id="username">VoltPy</span>
            </div>
            <div class="balance-container">
                <span id="balance">0</span> 💰
            </div>
        </header>

        <div class="energy-section">
            <div class="energy-bar-bg">
                <div id="energy-bar" style="width: 100%;"></div>
            </div>
            <div class="energy-info">
                <span id="energy-text">500 / 500</span>
            </div>
        </div>

        <main>
            <section id="home" class="screen active">
                <div id="tap-button-container">
                    <div id="tap-button">
                        <img src="https://img.icons8.com/clouds/200/lightning-bolt.png" alt="Volt">
                    </div>
                </div>
            </section>

            <section id="earn" class="screen">
                <h2 class="screen-title">🎰 Şans Çarkı</h2>
                <p style="text-align:center; color:#94a3b8; font-size: 12px; margin-bottom: 20px;">
                    Büyük ödül için %1 şans! Denemeye cesaretin var mı?
                </p>
                
                <div class="wheel-outer">
                    <div class="wheel-pointer"></div>
                    <canvas id="wheel-canvas" width="320" height="320"></canvas>
                </div>

                <div class="button-group" style="margin-top: 30px;">
                    <button id="spin-button">ÇEVİR (100 💰)</button>
                </div>
            </section>

            <section id="market" class="screen">
                <h2 class="screen-title">🛒 SMM Market</h2>
                <div id="market-list">
                    </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="home">
                <span class="nav-icon">⚡</span>
                <span class="nav-text">TAPPER</span>
            </button>
            <button class="nav-btn" data-target="earn">
                <span class="nav-icon">🎡</span>
                <span class="nav-text">KAZAN</span>
            </button>
            <button class="nav-btn" data-target="market">
                <span class="nav-icon">🛒</span>
                <span class="nav-text">MARKET</span>
            </button>
        </nav>
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
