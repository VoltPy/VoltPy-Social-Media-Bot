<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoltPy SMM Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <header class="top-bar">
            <div class="user-info">
                👋 <span id="username">Yükleniyor...</span>
            </div>
            <div class="balance-container">
                <span id="balance">0</span> 💰
            </div>
        </header>

        <div class="energy-section">
            <div class="energy-bar-bg">
                <div id="energy-bar"></div>
            </div>
            <small id="energy-text">500 / 500</small>
        </div>

        <main>
            <section id="home" class="screen active">
                <div id="tap-button-container">
                    <div id="tap-button">
                        <img src="https://img.icons8.com/clouds/200/lightning-bolt.png" alt="Volt">
                    </div>
                </div>
            </section>

            <section id="earn" class="screen">
                <h2 class="screen-title">Şans Çarkı</h2>
                
                <div class="wheel-container">
                    <div class="wheel-pointer">▼</div>
                    
                    <canvas id="wheel-canvas" width="320" height="320"></canvas>
                </div>

                <div class="button-group">
                    <button id="spin-button">ÇEVİR (100 💰)</button>
                </div>
            </section>

            <section id="market" class="screen">
                <h2 class="screen-title">SMM Market</h2>
                <div id="market-list">
                    </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="home">
                <span class="nav-icon">⚡</span>
                <span class="nav-text">TAPPER</span>
            </button>
            <button class="nav-btn" data-target="earn">
                <span class="nav-icon">🎡</span>
                <span class="nav-text">KAZAN</span>
            </button>
            <button class="nav-btn" data-target="market">
                <span class="nav-icon">🛒</span>
                <span class="nav-text">MARKET</span>
            </button>
        </nav>
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
